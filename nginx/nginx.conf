# ============================================================
# URL Shortener Service - Nginx Configuration
# ============================================================
# This configuration handles:
# 1. Frontend SPA serving (index.html)
# 2. API requests proxying to PHP-FPM backend
# 3. Short URL redirection logic
# 4. Static asset serving
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ----------------------------------------------------------
    # Logging Configuration
    # ----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ----------------------------------------------------------
    # Performance Optimization
    # ----------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ----------------------------------------------------------
    # Upstream Backend Configuration
    # ----------------------------------------------------------
    upstream php_backend {
        server backend:9000;
    }

    # ----------------------------------------------------------
    # Health Check Endpoint
    # --------------------------------------------------------        listen 80--
    server {
;
        server_name localhost;

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # ----------------------------------------------------------
    # Main Server Configuration
    # ----------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Root directory for frontend
        root /var/www/html/frontend;

        # ----------------------------------------------------------
        # Frontend SPA Routing
        # ----------------------------------------------------------
        # Serve static frontend files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ----------------------------------------------------------
        # Static Assets (Frontend)
        # ----------------------------------------------------------
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ----------------------------------------------------------
        # API Requests - Proxy to PHP-FPM Backend
        # ----------------------------------------------------------
        location /api/ {
            # Rewrite /api/ prefix to backend path
            rewrite ^/api(/.*)$ /backend/web/index.php$1 break;

            # Proxy to PHP-FPM
            fastcgi_pass php_backend;
            fastcgi_index index.php;

            # FastCGI parameters
            fastcgi_param SCRIPT_FILENAME /var/www/html/backend/web/index.php;
            fastcgi_param SCRIPT_NAME /var/www/html/backend/web/index.php;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param QUERY_STRING $query_string;
            fastcgi_param REQUEST_METHOD $request_method;
            fastcgi_param CONTENT_TYPE $content_type;
            fastcgi_param CONTENT_LENGTH $content_length;

            # HTTP headers
            fastcgi_param HTTP_HOST $server_name;
            fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
            fastcgi_param HTTP_X_REAL_IP $remote_addr;
            fastcgi_param HTTP_ACCEPT $http_accept;

            # CORS headers for API requests
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;

            # Handle preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ----------------------------------------------------------
        # Short URL Redirection
        # ----------------------------------------------------------
        # Match short codes: exactly 6 alphanumeric characters
        # This takes precedence over SPA catch-all
        location ~ ^/([a-zA-Z0-9]{6})$ {
            # Rewrite to backend redirect controller
            rewrite ^/([a-zA-Z0-9]{6})$ /backend/web/index.php?r=redirect/index&code=$1 last;
        }

        # Fallback for PHP scripts in backend
        location ~ \.php$ {
            # Deny direct PHP execution from root
            return 404;
        }

        # ----------------------------------------------------------
        # Security Headers
        # ----------------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ----------------------------------------------------------
        # Error Pages
        # ----------------------------------------------------------
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
