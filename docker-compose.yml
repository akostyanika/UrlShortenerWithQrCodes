services:
  db:
    image: mariadb:10.11
    container_name: urlshortener_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret_pass}
      MYSQL_DATABASE: ${DB_NAME:-urlshortener}
      MYSQL_USER: ${DB_USER:-app_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-app_secret_pass}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

  # PHP-FPM Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urlshortener_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      PHP_FPM_USER: www-data
      PHP_FPM_GROUP: www-data
      DB_HOST: db
      DB_NAME: ${DB_NAME:-urlshortener}
      DB_USER: ${DB_USER:-app_user}
      DB_PASSWORD: ${DB_PASSWORD:-app_secret_pass}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
    volumes:
      - ./backend:/var/www/html
      - backend_logs:/var/www/html/runtime
    networks:
      - app_network

  # Nginx Web Server Service
  webserver:
    image: nginx:1.25-alpine
    container_name: urlshortener_webserver
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./frontend:/var/www/html/frontend:ro
      - ./backend:/var/www/html/backend:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
    name: urlshortener_db_data
  backend_logs:
    name: urlshortener_backend_logs
