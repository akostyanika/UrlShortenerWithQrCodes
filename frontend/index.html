<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="URL Shortener Service - Create short links and QR codes">
    <title>URL Shortener | Create Short Links & QR Codes</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
            --success-color: #198754;
            --bg-color: #f8f9fa;
            --card-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }

        .hero-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .main-card {
            background: white;
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
            padding: 2.5rem;
            max-width: 600px;
            width: 100%;
        }

        .url-input {
            border-radius: 0.5rem;
            padding: 1rem;
            font-size: 1.1rem;
            border: 2px solid #dee2e6;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .url-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .url-input.is-invalid {
            border-color: #dc3545;
        }

        .btn-shorten {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }

        .btn-shorten:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(13, 110, 253, 0.3);
        }

        .btn-shorten:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .result-section {
            display: none;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid #f0f0f0;
            animation: fadeIn 0.5s ease-in-out;
        }

        .result-section.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .short-url-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .short-url-text {
            font-size: 1.25rem;
            font-weight: 600;
            word-break: break-all;
        }

        .copy-btn {
            transition: all 0.2s;
        }

        .copy-btn:hover {
            transform: scale(1.05);
        }

        .copy-btn.copied {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .qr-code-container {
            background: white;
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.1);
        }

        .qr-code-img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
        }

        .loading-spinner {
            display: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        footer {
            background-color: white;
            border-top: 1px solid #dee2e6;
            padding: 1.5rem 0;
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1050;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-link-45deg me-2"></i>
                URL Shortener
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="hero-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="main-card">
                        <div class="text-center mb-4">
                            <h1 class="h3 mb-2">Create Short Link & QR Code</h1>
                            <p class="text-muted">Enter a long URL to generate a short link with QR code</p>
                        </div>

                        <!-- URL Input Form -->
                        <form id="shortenForm" novalidate>
                            <div class="mb-3">
                                <label for="urlInput" class="form-label visually-hidden">Long URL</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-globe2"></i>
                                    </span>
                                    <input
                                        type="url"
                                        class="form-control url-input"
                                        id="urlInput"
                                        placeholder="https://example.com/your-long-url"
                                        required
                                        autocomplete="url"
                                    >
                                </div>
                                <div class="error-message" id="urlError"></div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-shorten" id="shortenBtn">
                                    <span class="loading-spinner" id="btnSpinner"></span>
                                    <span id="btnText">Shorten URL</span>
                                </button>
                            </div>
                        </form>

                        <!-- Results Section -->
                        <div class="result-section" id="resultSection">
                            <!-- Short URL -->
                            <div class="short-url-box">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <small class="opacity-75">Your Short Link</small>
                                    <button class="btn btn-sm btn-light copy-btn" id="copyBtn" title="Copy to clipboard">
                                        <i class="bi bi-clipboard"></i>
                                    </button>
                                </div>
                                <div class="short-url-text" id="shortUrlText"></div>
                            </div>

                            <!-- QR Code -->
                            <div class="qr-code-container text-center">
                                <small class="text-muted d-block mb-2">Scan QR Code</small>
                                <img src="" alt="QR Code" class="qr-code-img" id="qrCodeImg">
                            </div>

                            <!-- Action Buttons -->
                            <div class="mt-3 text-center">
                                <a href="#" class="btn btn-outline-primary btn-sm" id="visitLink" target="_blank">
                                    <i class="bi bi-box-arrow-up-right me-1"></i>
                                    Visit Link
                                </a>
                                <button class="btn btn-outline-secondary btn-sm" id="newLinkBtn">
                                    <i class="bi bi-plus-lg me-1"></i>
                                    New Link
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <p class="text-muted mb-0">
                <small>
                    Built with <i class="bi bi-heart-fill text-danger"></i> using Yii2 & Bootstrap 5
                </small>
            </p>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div class="toast-container">
        <div class="toast align-items-center text-white bg-success" id="copyToast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    Link copied to clipboard!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <!-- Application JavaScript -->
    <script src="app.js"></script>
</body>
</html>
